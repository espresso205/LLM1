version: "3.9"

services:
  # -----------------------------------------------------------------------
  # 调度器
  # -----------------------------------------------------------------------
  scheduler:
    build: ./scheduler
    container_name: scheduler
    ports:
      - "8002:8002"
    environment:
      - SCHEDULER_DATABASE_URL=sqlite+aiosqlite:///./scheduler.db
    volumes:
      - scheduler_data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/nodes')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # 推理节点 1（API Key 1）
  # -----------------------------------------------------------------------
  inference_node_1:
    build: ./inference_node
    container_name: inference_node_1
    ports:
      - "8001:8001"
    environment:
      - NODE_ID=deepseek-1
      - NODE_PORT=8001
      - NODE_URL=http://inference_node_1:8001
      - SCHEDULER_URL=http://scheduler:8002
      - DEEPSEEK_API_KEY=sk-800cf8dc6c284ec98b1ad3a5e7e4e183
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
      - DEEPSEEK_MODEL=deepseek-chat
      - HEARTBEAT_INTERVAL=10
    depends_on:
      scheduler:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # 推理节点 2（API Key 2）
  # -----------------------------------------------------------------------
  inference_node_2:
    build: ./inference_node
    container_name: inference_node_2
    ports:
      - "8004:8004"
    environment:
      - NODE_ID=deepseek-2
      - NODE_PORT=8004
      - NODE_URL=http://inference_node_2:8004
      - SCHEDULER_URL=http://scheduler:8002
      - DEEPSEEK_API_KEY=sk-9f7afe66958d4f64a33ba76c35f7203f
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
      - DEEPSEEK_MODEL=deepseek-chat
      - HEARTBEAT_INTERVAL=10
    depends_on:
      scheduler:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # 网关后端
  # -----------------------------------------------------------------------
  gateway:
    build: ./gateway/backend
    container_name: gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./inference.db
      - SCHEDULER_URL=http://scheduler:8002
    volumes:
      - gateway_data:/app
    depends_on:
      scheduler:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # 前端（开发模式，生产环境可换 nginx）
  # -----------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./gateway/frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE=http://gateway:8000

volumes:
  scheduler_data:
  gateway_data:
